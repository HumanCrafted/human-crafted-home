# Site settings
title: human crafted
email: your-email@example.com
description: >-
  A product design studio specializing in the rapid realization of ideas.
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://humancrafted.co" # the base hostname & protocol for your site, e.g. http://example.com

# Loops signup (see _includes/subscribe-form.html)
# loops_form_id: from Loops → Forms → Settings. The form renders only once this is set.
# loops_list_id: the list signups join. Must be Public in Loops — form endpoints
#                cannot subscribe contacts to a private list.
loops_form_id: "cm1uuwuwg001esmbmj9jxzdct"
loops_list_id: "cmrnq2xrf0hdy0j2367qs5udx" # Newsletter

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag
  - jekyll-redirect-from

# Exclude from processing
exclude:
  - .obsidian/
  - "**/*.base"
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md

# Collections for organized content
collections:
  docs:
    output: true
    permalink: /:slug/
  posts:
    output: true
    permalink: /:slug/
  projects:
    output: true
    permalink: /:slug/
music:
    output: false

# Obsidian-friendly settings
kramdown:
  input: GFM
  syntax_highlighter: rouge
  footnote_nr: 1
  show_warnings: false
  syntax_highlighter_opts:
    block:
      line_numbers: false

# GitHub Pages compatible plugins only